<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudNine Rewards — Interactive Briefing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:#070815;color:#e0e0ff;line-height:1.5;overflow:hidden;height:100vh;cursor:none}
::selection{background:rgba(255,206,0,0.3);color:#fff}
:root{--cyan:#05d9e8;--gold:#ffce00;--pink:#ff2a6d;--muted:#8888bb}

/* ─── CUSTOM CURSOR ─── */
#cursorGlow{position:fixed;width:300px;height:300px;border-radius:50%;pointer-events:none;z-index:99998;background:radial-gradient(circle,rgba(5,217,232,0.06),transparent 70%);transform:translate(-50%,-50%);transition:opacity .3s}

/* ─── BG SCANLINES ─── */
@keyframes scanlines{0%{transform:translateY(0)}100%{transform:translateY(4px)}}
.bg-scan{position:fixed;inset:0;z-index:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.1) 2px,rgba(0,0,0,0.1) 4px);animation:scanlines .1s linear infinite;opacity:0.2}

/* ─── BG ORBS ─── */
.bg-orb{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;overflow:hidden}
.bg-orb .orb{position:absolute;border-radius:50%;filter:blur(120px)}
.bg-orb .orb.o1{width:800px;height:800px;background:radial-gradient(circle,rgba(255,42,109,0.12),transparent);top:-300px;right:-200px;animation:float1 25s ease-in-out infinite}
.bg-orb .orb.o2{width:600px;height:600px;background:radial-gradient(circle,rgba(5,217,232,0.08),transparent);bottom:-250px;left:-250px;animation:float2 30s ease-in-out infinite}
.bg-orb .orb.o3{width:400px;height:400px;background:radial-gradient(circle,rgba(255,206,0,0.05),transparent);top:50%;left:60%;animation:float3 20s ease-in-out infinite}
@keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,-100px)}}
@keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-80px,60px)}}
@keyframes float3{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-40%,-60%) scale(1.4)}}

/* ─── GRID ─── */
.bg-grid{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;
background-image:
  linear-gradient(0deg,rgba(5,217,232,0.06) 1px,transparent 1px),
  linear-gradient(90deg,rgba(255,42,109,0.04) 1px,transparent 1px);
background-size:60px 60px}

/* ─── SUN ─── */
.bg-sun{position:fixed;top:6%;left:50%;transform:translateX(-50%);width:500px;height:250px;z-index:0;pointer-events:none;
background:linear-gradient(180deg,rgba(255,42,109,0.06) 0%,rgba(255,206,0,0.04) 30%,transparent 75%);
border-radius:50%/100% 100% 0 0;filter:blur(60px);opacity:0.6;animation:sunGlow 4s ease-in-out infinite}
@keyframes sunGlow{0%,100%{opacity:0.5;filter:blur(60px)}50%{opacity:0.8;filter:blur(40px)}}

/* ─── INTRO CONTENT ─── */
.wrapper{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:10}

/* ─── PERSPECTIVE GRID ─── */
.grid-scene{position:fixed;bottom:0;left:0;width:100%;height:60%;z-index:1;perspective:600px;overflow:hidden;pointer-events:none;transition:transform .2s ease-out}
.grid-scene .grid-stage{position:absolute;bottom:-20%;left:-15%;width:130%;height:130%;transform-origin:bottom center;transform:rotateX(65deg) translateZ(0)}
.grid-scene .gln{position:absolute;left:0;width:100%;height:1px;opacity:0;animation:glIn 1.2s ease-out forwards}
@keyframes glIn{0%{opacity:0;transform:scaleX(0.3)}100%{opacity:1;transform:scaleX(1)}}

/* ─── RETRO SUN DISPLAY ─── */
.sun-display{position:fixed;top:10%;left:50%;transform:translateX(-50%);width:360px;height:170px;border-radius:50%/100% 100% 0 0;z-index:2;pointer-events:none;opacity:0;animation:sunRise 2s ease-out .3s forwards}
.sun-display::before{content:'';position:absolute;inset:0;border-radius:inherit;
background:linear-gradient(180deg,#ff2a6d 0%,#ff6070 15%,#ff9a44 30%,#ffce00 45%,transparent 70%);
opacity:0.85}
.sun-display::after{content:'';position:absolute;inset:0;border-radius:inherit;
background:repeating-linear-gradient(0deg,transparent 0px,transparent 5px,rgba(0,0,0,0.18) 5px,rgba(0,0,0,0.18) 6px);
animation:sunPulse 3s ease-in-out infinite}
@keyframes sunRise{0%{opacity:0;transform:translateX(-50%) scaleY(0.15)}100%{opacity:1;transform:translateX(-50%) scaleY(1)}}
@keyframes sunPulse{0%,100%{opacity:0.35}50%{opacity:1}}

/* ─── CANVAS ─── */
#particleCanvas{position:fixed;inset:0;z-index:3;pointer-events:none}

/* ─── AIRPLANE ─── */
.airplane{position:fixed;top:22%;z-index:4;pointer-events:none;opacity:0;animation:planeFly 4s ease-in-out .8s forwards}
@keyframes planeFly{0%{opacity:0;transform:translate(-120px,40px) rotate(-25deg) scale(0.4)}12%{opacity:1}45%{opacity:1}100%{opacity:0;transform:translate(calc(100vw + 120px),-120px) rotate(10deg) scale(0.95)}}
.airplane svg{width:80px;height:80px;filter:drop-shadow(0 0 60px rgba(5,217,232,0.4)) drop-shadow(0 0 120px rgba(255,42,109,0.15))}
.airplane .trail{position:absolute;top:50%;right:100%;width:250px;height:2px;background:linear-gradient(270deg,rgba(5,217,232,0.2),transparent)}

/* ─── CENTER STAGE ─── */
.stage{position:relative;z-index:10;text-align:center;opacity:0;animation:stageIn 1s ease .7s forwards}
@keyframes stageIn{0%{opacity:0;transform:translateY(30px)}100%{opacity:1;transform:translateY(0)}}
.terminal{font-size:14px;font-family:'Courier New',monospace;color:var(--cyan);margin-bottom:24px;height:24px;letter-spacing:.02em;text-shadow:0 0 15px rgba(5,217,232,0.12)}
.cursor{display:inline-block;animation:blink .7s step-end infinite;color:var(--cyan);font-weight:100}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.title{font-size:clamp(44px,8vw,80px);font-weight:900;color:#fff;letter-spacing:-2px;line-height:1;margin-bottom:4px;text-shadow:0 0 40px rgba(5,217,232,0.04)}
.title-accent{display:block;background:linear-gradient(135deg,#05d9e8 0%,#ffce00 50%,#ff2a6d 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-size:clamp(34px,6vw,64px);letter-spacing:6px;position:relative}
.title-accent.glitch{animation:glitch 3.5s ease-in-out 2.2s infinite}
@keyframes glitch{0%,88%,100%{transform:translate(0);opacity:1}90%{transform:translate(-5px,2px);opacity:0.88;clip-path:inset(30% 0 25% 0)}92%{transform:translate(5px,-1px);opacity:0.82;clip-path:inset(10% 0 55% 0)}94%{transform:translate(-3px,3px);opacity:0.9;clip-path:inset(45% 0 15% 0)}96%{transform:translate(3px,-2px)}}
.sub{font-size:13px;color:var(--muted);margin-bottom:32px;letter-spacing:.2em;text-transform:uppercase;font-weight:500}

/* ─── BUTTON ─── */
.btn-wrap{position:relative;display:inline-block}
.btn{display:inline-flex;align-items:center;gap:12px;padding:16px 44px;border:1px solid rgba(5,217,232,0.15);border-radius:50px;background:rgba(5,217,232,0.02);color:var(--cyan);font-size:14px;font-weight:700;letter-spacing:.12em;cursor:none;transition:all .4s;font-family:'Inter',sans-serif;text-transform:uppercase;opacity:0;animation:btnIn .9s ease 3.8s forwards;position:relative;overflow:hidden;user-select:none;outline:none}
.btn:hover{background:rgba(5,217,232,0.07);border-color:rgba(5,217,232,0.3);box-shadow:0 0 40px rgba(5,217,232,0.08),0 0 80px rgba(5,217,232,0.02);transform:scale(1.04)}
.btn:active{transform:scale(0.97)}
.btn .arrow{display:inline-block;transition:transform .3s;font-size:16px}
.btn:hover .arrow{transform:translateX(6px)}
@keyframes btnIn{0%{opacity:0;transform:translateY(14px)}100%{opacity:1;transform:translateY(0)}}
.btn .ripple-el{position:absolute;border-radius:50%;background:rgba(5,217,232,0.15);pointer-events:none;animation:rippleOut .6s ease-out forwards}
@keyframes rippleOut{0%{width:0;height:0;opacity:1}100%{width:200px;height:200px;opacity:0}}
.hint{font-size:12px;color:var(--muted);margin-top:18px;opacity:0;animation:hintIn .8s ease 4.8s forwards}
@keyframes hintIn{0%{opacity:0}100%{opacity:1}}
.hint span{color:var(--cyan);font-weight:700}
.hint kbd{display:inline-block;padding:1px 8px;background:rgba(5,217,232,0.06);border:1px solid rgba(5,217,232,0.1);border-radius:4px;font-size:11px;font-family:'Inter',monospace;color:var(--cyan)}
.status-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:20;font-size:11px;color:rgba(136,136,187,0.4);letter-spacing:.1em;font-family:'Courier New',monospace;opacity:0;animation:hintIn 1s ease 5.5s forwards}
.status-bar span{color:rgba(5,217,232,0.3)}

/* ─── LOADING BAR ─── */
.load-bar{position:fixed;top:0;left:0;width:100%;height:3px;z-index:20;background:rgba(5,217,232,0.02)}
.load-bar .fill{height:100%;width:0%;background:linear-gradient(90deg,#ff2a6d,#ffce00,#05d9e8);animation:loadFill 5s linear forwards}
@keyframes loadFill{0%{width:0%}100%{width:100%}}

/* ─── MOBILE ─── */
@media(max-width:600px){
  body{cursor:auto}
  .title{font-size:clamp(30px,10vw,44px)}
  .title-accent{font-size:clamp(24px,8vw,36px);letter-spacing:4px}
  .terminal{font-size:11px;min-width:auto;margin-bottom:18px;height:20px}
  .sub{font-size:10px;margin-bottom:24px;letter-spacing:.12em}
  .btn{padding:14px 30px;font-size:12px;cursor:pointer}
  .sun-display{width:220px;height:100px;top:14%}
  .grid-scene{height:45%}
  .airplane svg{width:56px;height:56px}
  #cursorGlow{display:none}
  .status-bar{font-size:10px;bottom:16px}
  .bg-grid{background-size:40px 40px}
}
</style>
</head>
<body>

<!-- CURSOR GLOW -->
<div id="cursorGlow"></div>

<!-- LOADING BAR -->
<div class="load-bar"><div class="fill"></div></div>

<!-- SCANLINES -->
<div class="bg-scan"></div>

<!-- ORBS -->
<div class="bg-orb"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>

<!-- SUN -->
<div class="bg-sun"></div>

<!-- SYNTHWAVE GRID -->
<div class="bg-grid"></div>

<!-- PERSPECTIVE GRID SCENE -->
<div class="grid-scene" id="gridScene"><div class="grid-stage" id="gridStage"></div></div>

<!-- RETRO SUN -->
<div class="sun-display" id="sunDisplay"></div>

<!-- PARTICLES CANVAS -->
<canvas id="particleCanvas"></canvas>

<!-- AIRPLANE -->
<div class="airplane" id="airplane">
  <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M24 42l6-2.5 4 7 11-9 7-2.5-2.5-3.5-9 2.5-4.5-6-5 4 3.5 5.5-7 2.5-3.5 2z" fill="url(#ag)"/>
    <line x1="43" y1="29" x2="52" y2="20" stroke="url(#ag)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <defs><linearGradient id="ag" x1="0" y1="0" x2="72" y2="72"><stop stop-color="#05d9e8"/><stop offset="0.5" stop-color="#ffce00"/><stop offset="1" stop-color="#ff2a6d"/></linearGradient></defs>
  </svg>
  <div class="trail"></div>
</div>

<!-- CENTER CONTENT -->
<div class="wrapper">
  <div class="stage">
    <div class="terminal"><span id="terminalText"></span><span class="cursor">|</span></div>
    <div class="title">CLOUDNINE<span class="title-accent glitch">REWARDS</span></div>
    <div class="sub">Strategy Dashboard — Octopus Pipeline v2</div>
    <div class="btn-wrap">
      <button class="btn" id="launchBtn"><span class="arrow">▶</span> Launch Control</button>
    </div>
    <div class="hint">Auto-launching in <span id="timer">6</span>s &middot; Press <kbd>Enter</kbd> or <kbd>Space</kbd></div>
  </div>
</div>

<div class="status-bar"><span>◆</span> SYSTEM READY <span>◆</span></div>

<script>
// ─── PERSPECTIVE GRID ───
(function(){
  var gs = document.getElementById('gridStage');
  if(!gs) return;
  for(var i = 0, L = 40; i < L; i++){
    var ln = document.createElement('div');
    ln.className = 'gln';
    var p = i / L;
    ln.style.bottom = (p * p * 90) + '%';
    ln.style.animationDelay = (p * 0.5) + 's';
    ln.style.opacity = Math.max(0.05, 1 - p * 0.85);
    ln.style.background = 'linear-gradient(90deg,transparent,rgba(5,217,232,' + (0.04 + p * 0.04) + '),rgba(255,42,109,' + (0.02 + p * 0.02) + '),transparent)';
    gs.appendChild(ln);
  }
})();

// ─── TYPEWRITER ───
(function(){
  var el = document.getElementById('terminalText');
  if(!el) return;
  var txt = '> SYSTEM BOOT: OCTOPUS PIPELINE v2 — CLOUDNINE REWARDS', i = 0;
  function ty(){
    if(i < txt.length){
      el.textContent += txt.charAt(i);
      i++;
      setTimeout(ty, 18 + Math.random() * 32);
    }
  }
  setTimeout(ty, 1200);
})();

// ─── TIMER & NAVIGATION ───
(function(){
  var el = document.getElementById('timer'), t = 6;
  if(!el) return;
  var iv = setInterval(function(){
    t--;
    if(t <= 0){ clearInterval(iv); goDashboard(); }
    else el.textContent = t;
  }, 1000);
})();

function goDashboard(){
  window.location.href = 'dashboard.html';
}

// ─── KEYBOARD ───
document.addEventListener('keydown', function(e){
  if(e.key === 'Enter' || e.key === ' '){
    e.preventDefault();
    goDashboard();
  }
});

// ─── PARTICLES (interactive) ───
(function(){
  var c = document.getElementById('particleCanvas');
  if(!c) return;
  var ctx = c.getContext('2d'), w, h, pts = [], n = 120, mx = -9999, my = -9999;

  function resize(){
    w = c.width = window.innerWidth;
    h = c.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for(var i = 0; i < n; i++){
    pts.push({
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4 - 0.06,
      r: Math.random() * 2.2 + 0.4,
      o: Math.random() * 0.35 + 0.08,
      baseVx: 0,
      baseVy: 0
    });
    pts[i].baseVx = pts[i].vx;
    pts[i].baseVy = pts[i].vy;
  }

  document.addEventListener('mousemove', function(e){
    mx = e.clientX;
    my = e.clientY;
  });
  document.addEventListener('mouseleave', function(){
    mx = -9999;
    my = -9999;
  });

  function draw(){
    ctx.clearRect(0, 0, w, h);
    for(var i = 0; i < n; i++){
      var p = pts[i];
      var dx = p.x - mx;
      var dy = p.y - my;
      var dist = Math.sqrt(dx * dx + dy * dy);

      // Mouse repulsion
      if(dist < 150 && dist > 0){
        var force = (150 - dist) / 150 * 0.6;
        p.vx += (dx / dist) * force;
        p.vy += (dy / dist) * force;
      }
      // Return to base velocity
      p.vx += (p.baseVx - p.vx) * 0.02;
      p.vy += (p.baseVy - p.vy) * 0.02;

      p.x += p.vx;
      p.y += p.vy;

      // Wrap
      if(p.x < -10) p.x = w + 10;
      if(p.x > w + 10) p.x = -10;
      if(p.y < -20) p.y = h + 20;
      if(p.y > h + 20) p.y = -20;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = (p.y < h * 0.35 ? 'rgba(255,42,109,' : 'rgba(5,217,232,') + p.o + ')';
      ctx.fill();

      // Connection lines near cursor
      if(dist < 180 && dist > 0){
        var alpha = (180 - dist) / 180 * 0.12;
        ctx.beginPath();
        ctx.moveTo(mx, my);
        ctx.lineTo(p.x, p.y);
        ctx.strokeStyle = 'rgba(5,217,232,' + alpha + ')';
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
    requestAnimationFrame(draw);
  }
  draw();

  // Touch support
  document.addEventListener('touchmove', function(e){
    var t = e.touches[0];
    mx = t.clientX;
    my = t.clientY;
  }, {passive: true});
  document.addEventListener('touchend', function(){
    mx = -9999;
    my = -9999;
  });
})();

// ─── MOUSE GRID TILT ───
(function(){
  var gs = document.getElementById('gridScene');
  if(!gs) return;
  var cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  window.addEventListener('resize', function(){ cx = window.innerWidth / 2; cy = window.innerHeight / 2; });
  document.addEventListener('mousemove', function(e){
    var dx = (e.clientX - cx) / cx;
    var dy = (e.clientY - cy) / cy;
    gs.style.transform = 'translateX(' + (dx * 6) + 'px) translateY(' + (dy * -3) + 'px) rotateX(' + (-dy * 1.5) + 'deg)';
  });
})();

// ─── CURSOR GLOW ───
(function(){
  var cg = document.getElementById('cursorGlow');
  if(!cg) return;
  document.addEventListener('mousemove', function(e){
    cg.style.left = e.clientX + 'px';
    cg.style.top = e.clientY + 'px';
    cg.style.opacity = '1';
  });
  document.addEventListener('mouseleave', function(){
    cg.style.opacity = '0';
  });
  // Touch: hide cursor glow
  document.addEventListener('touchstart', function(){ cg.style.display = 'none'; });
})();

// ─── BUTTON RIPPLE ───
(function(){
  var btn = document.getElementById('launchBtn');
  if(!btn) return;
  btn.addEventListener('click', function(e){
    var rect = btn.getBoundingClientRect();
    var x = e.clientX - rect.left;
    var y = e.clientY - rect.top;
    var ri = document.createElement('div');
    ri.className = 'ripple-el';
    ri.style.left = (x - 100) + 'px';
    ri.style.top = (y - 100) + 'px';
    btn.appendChild(ri);
    setTimeout(function(){ ri.remove(); }, 700);
    // Navigate after ripple
    setTimeout(goDashboard, 200);
  });
  // Touch support
  btn.addEventListener('touchend', function(e){
    e.preventDefault();
    var rect = btn.getBoundingClientRect();
    var touch = e.changedTouches[0];
    var x = touch.clientX - rect.left;
    var y = touch.clientY - rect.top;
    var ri = document.createElement('div');
    ri.className = 'ripple-el';
    ri.style.left = (x - 100) + 'px';
    ri.style.top = (y - 100) + 'px';
    btn.appendChild(ri);
    setTimeout(function(){ ri.remove(); }, 700);
    setTimeout(goDashboard, 200);
  });
})();

// ─── SUN SCANNER BANDS ───
(function(){
  var sun = document.getElementById('sunDisplay');
  if(!sun) return;
  // Add animated scan band overlay
  var scan = document.createElement('div');
  scan.style.cssText = 'position:absolute;inset:0;border-radius:inherit;pointer-events:none;background:linear-gradient(180deg,transparent 0%,rgba(255,255,255,0.03) 40%,rgba(255,255,255,0.06) 50%,rgba(255,255,255,0.03) 60%,transparent 100%);background-size:100% 200%;animation:scanBand 3s ease-in-out infinite';
  var style = document.createElement('style');
  style.textContent = '@keyframes scanBand{0%{background-position:0 0}100%{background-position:0 100%}}';
  document.head.appendChild(style);
  sun.appendChild(scan);
})();
</script>
</body>
</html>
